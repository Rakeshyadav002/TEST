<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search Engine</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background-image: url("background.jpg"); /* Change this to your image */
    background-size: cover;          /* Makes the image cover the whole screen */
    background-position: center;     /* Centers the image */
    background-repeat: no-repeat;    /* Prevents repeating */
    background-attachment: fixed;    /* Keeps the image fixed while scrolling */

    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}
.container{
    width:420px;
    padding:35px;

    background:rgba(0,0,0,0.82);
    border:2px solid #00ff88;

    backdrop-filter:blur(8px);

    border-radius:18px;

    box-shadow:
        0 0 15px #00ff88,
        0 0 35px rgba(0,255,136,.25);

    color:#00ff88;
    text-align:center;
}

.logo{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid #2563eb;
    margin-bottom:20px;
}

h1{
    color:#00ff88;
    margin-bottom:10px;
}

.subtitle{
    color:#64748b;
    margin-bottom:25px;
    font-size:15px;
}

input{
    width:100%;
    padding:14px;
    border:2px solid #00ff88;
    border-radius:10px;
    font-size:16px;
    transition:.3s;
    outline:none;
    color:#00ff88;
    background:#101010;
}

input:focus{
    border-color:#2563eb;
    box-shadow:0 0 10px rgba(37,99,235,.3);
}

button{
    width:100%;
    margin-top:15px;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#00ff88;
    color:black;
    font-size:16px;
    cursor:pointer;
    transition:.3s;
     font-weight:bold;
}

button:hover{
    background:#00cc66;
    transform:translateY(-2px);
}

#result{
    margin-top:25px;
    padding:15px;
    background:#111;
    border-radius:10px;
    border:1px solid  #00ff88;
    min-height:60px;
    color:#00ff88;
    word-wrap:break-word;
}

.footer{
    margin-top:20px;
    color:#94a3b8;
    font-size:13px;
}
</style>

</head>

<body>

<div class="container">

    <!-- Replace this image later -->
    <img src="image.jpg" alt="Logo" class="logo">

    <h1>Search Anything</h1>
    <p class="subtitle">
        Enter Anything and discover what it reveals.
    </p>

    <input
        type="text"
        id="search"
        placeholder="Search">

    <button onclick="searchPerson()">
        🔍 Search
    </button>

    <div id="result"></div>



</div>

<script src="scr.js"></script>

</body>
</html>
